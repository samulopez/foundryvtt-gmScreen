name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Extract version without v prefix
        id: version
        run: echo "TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

        # Substitute the Manifest and Download URLs in the system.json
      - name: Substitute Manifest and Download Links For Versioned Ones
        id: sub_manifest_link_version
        uses: microsoft/variable-substitution@6287962da9e5b6e68778dc51e840caa03ca84495 # v1.0.0
        with:
          files: 'src/module.json'
        env:
          version: ${{ steps.version.outputs.TAG }}
          download: https://github.com/${{github.repository}}/releases/download/${{github.ref_name}}/module.zip

      # run our gulp build action
      - name: Build dist directory
        run: npm run build

      # create a zip file with all files required by the module to add to the release
      - name: Zip Files
        working-directory: ./dist
        run: zip -r ./module.zip ./*

      - name: set deployment outputs
        id: set-pr-deploy-info
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease=false
          # Check if the tag contains 'beta'
          if [[ "$tag" == *"-beta."* ]]; then
            prerelease=true
          fi
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@bcae7115752d4ed746ff92feb666574428a79415 # v6.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create a release for this specific version
      - name: Create Release
        id: create_version_release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true # set this to false if you want to prevent updating existing releases
          name: ${{ github.ref_name }}
          body: ${{steps.github_release.outputs.changelog}}
          draft: false
          prerelease: ${{ steps.set-pr-deploy-info.outputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './dist/gm-screen/module.json,./dist/module.zip'
          tag: ${{ github.ref_name }}

      # Publish this new version to the Foundry VTT Module Listing
      - name: Publish to Foundry VTT Repo
        id: publish_foundry_repo
        run: npx @ghost-fvtt/foundry-publish@4.0.0
        env:
          FVTT_DRY_RUN: ${{ steps.set-pr-deploy-info.outputs.prerelease }}
          FVTT_MANIFEST_PATH: src/module.json
          FVTT_TOKEN: ${{ secrets.FVTT_TOKEN }}
          FVTT_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json
